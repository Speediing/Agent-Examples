name: Tier 0 Eval

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: tier-0-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  examples-repo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: Agent-Examples

      - uses: actions/checkout@v4
        with:
          repository: Speediing/agent-example-site
          ref: main
          path: agent-example-site

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Agent-Examples/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Agent-Examples/requirements-dev.txt

      - name: Install Node dependencies
        working-directory: Agent-Examples
        run: npm ci

      - name: Install Python test dependencies
        working-directory: Agent-Examples
        run: python3 -m pip install -r requirements-dev.txt

      - name: Typecheck examples
        working-directory: Agent-Examples
        run: npm run typecheck

      - name: Build examples
        working-directory: Agent-Examples
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: Agent-Examples
        run: npx playwright install --with-deps chromium

      - name: Run Vitest Tier 0 suite
        working-directory: Agent-Examples
        env:
          AGENT_EXAMPLE_SITE_PATH: ${{ github.workspace }}/agent-example-site
        run: npm test

      - name: Run pytest
        working-directory: Agent-Examples
        run: python3 -m pytest

  docs-site:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: Speediing/agent-example-site
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Lint docs site
        run: npm ci && npm run lint

      - name: Build docs site
        run: npm run build
