name: Tier 1 LLM Eval

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tier-1-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  llm-evals:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: cursor-eval
    defaults:
      run:
        working-directory: Agent-Examples

    steps:
      - uses: actions/checkout@v4
        with:
          path: Agent-Examples

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Agent-Examples/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Build examples
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Tier 1 and Tier 2 LLM evals
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_MODEL: ${{ vars.CURSOR_EVAL_MODEL }}
          CURSOR_JUDGE_MODEL: ${{ vars.CURSOR_JUDGE_MODEL }}
          EVAL_SAMPLES: "1"
          EVAL_CASE_TIMEOUT_MS: "180000"
        run: npm run test:llm
